<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AS HOST</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── LOADER ── */
    #loader {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      z-index: 100;
      transition: opacity 0.5s ease;
    }
    #loader.hide { opacity: 0; pointer-events: none; }

    .l-title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: #636366;
    }

    .l-ring {
      width: 56px;
      height: 56px;
      border: 1.5px solid #2c2c2e;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }

    .l-dots {
      display: flex;
      gap: 7px;
    }
    .l-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #3a3a3c;
      animation: dotpulse 1.4s ease-in-out infinite;
    }
    .l-dot:nth-child(1) { animation-delay: 0s; }
    .l-dot:nth-child(2) { animation-delay: 0.2s; }
    .l-dot:nth-child(3) { animation-delay: 0.4s; }

    /* ── MAIN ── */
    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      opacity: 0;
      transition: opacity 0.5s ease;
      padding: 32px;
      text-align: center;
    }
    #app.visible { opacity: 1; }

    .brand {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: #636366;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 22px;
      background: #1c1c1e;
      border: 0.5px solid #3a3a3c;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .avatar svg { width: 36px; height: 36px; }

    .name {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.03em;
    }
    .sub {
      font-size: 14px;
      color: #636366;
      margin-top: 4px;
    }

    .btn {
      background: #fff;
      color: #000;
      font-size: 15px;
      font-weight: 600;
      padding: 15px 48px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: transform 0.12s ease, opacity 0.12s ease;
      letter-spacing: -0.01em;
    }
    .btn:active { transform: scale(0.95); opacity: 0.8; }
    .btn svg { width: 16px; height: 16px; }

    /* ── MODAL ── */
    #modal {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 200;
      display: none;
      flex-direction: column;
    }
    #modal.open { display: flex; }

    .modal-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px 12px;
      border-bottom: 0.5px solid #2c2c2e;
      flex-shrink: 0;
    }
    .modal-top-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .close-btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #2c2c2e;
      border: none;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .close-btn:active { background: #3a3a3c; }

    .modal-frame-wrap {
      flex: 1;
      position: relative;
    }
    .modal-frame-wrap iframe {
      width: 100%; height: 100%; border: none;
    }
    .frame-loader {
      position: absolute;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.3s ease;
    }
    .frame-loader.hidden { opacity: 0; pointer-events: none; }
    .frame-loader-ring {
      width: 36px;
      height: 36px;
      border: 1.5px solid #2c2c2e;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .modal-bottom {
      padding: 10px 18px 32px;
      display: flex;
      justify-content: center;
      border-top: 0.5px solid #2c2c2e;
      flex-shrink: 0;
    }
    .home-pill {
      width: 134px;
      height: 5px;
      background: #fff;
      border-radius: 3px;
      opacity: 0.25;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes dotpulse {
      0%, 100% { background: #3a3a3c; transform: scale(1); }
      50% { background: #fff; transform: scale(1.4); }
    }
  </style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="l-title">AS HOST</div>
  <div class="l-ring"></div>
  <div class="l-dots">
    <div class="l-dot"></div>
    <div class="l-dot"></div>
    <div class="l-dot"></div>
  </div>
</div>

<!-- MAIN -->
<div id="app">
  <div class="brand">AS HOST</div>
  <div class="avatar">
    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
  </div>
  <div>
    <div class="name">Open Chat</div>
    <div class="sub">Tap below to start</div>
  </div>
  <button class="btn" id="openBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    Start Chat
  </button>
</div>

<!-- MODAL -->
<div id="modal">
  <div class="modal-top">
    <button class="close-btn" id="closeBtn">✕</button>
    <span class="modal-top-title">AS HOST</span>
    <div style="width:30px;"></div>
  </div>
  <div class="modal-frame-wrap">
    <div class="frame-loader" id="frameLoader">
      <div class="frame-loader-ring"></div>
    </div>
    <iframe id="chatFrame" src="" title="Chat"></iframe>
  </div>
  <div class="modal-bottom">
    <div class="home-pill"></div>
  </div>
</div>

<script>
  const CHAT_URL = 'https://ios-chat-22498-449ae8d02f02.herokuapp.com/';

  setTimeout(() => {
    document.getElementById('loader').classList.add('hide');
    setTimeout(() => {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('app').classList.add('visible');
    }, 500);
  }, 2000);

  const modal = document.getElementById('modal');
  const frame = document.getElementById('chatFrame');
  const frameLoader = document.getElementById('frameLoader');

  document.getElementById('openBtn').addEventListener('click', () => {
    modal.classList.add('open');
    if (!frame.src || frame.src === 'about:blank') frame.src = CHAT_URL;
  });

  frame.addEventListener('load', () => {
    setTimeout(() => frameLoader.classList.add('hidden'), 300);
  });

  document.getElementById('closeBtn').addEventListener('click', () => {
    modal.classList.remove('open');
  });
</script>
</body>
</html>
